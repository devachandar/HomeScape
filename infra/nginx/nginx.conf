# HomeScape API Gateway.
# React -> Gateway -> {service}. Each downstream Django service still
# enforces its own JWT check and RBAC - Nginx here is routing + rate
# limiting + logging, not the source of truth for auth.
#
# Each service gets TWO location blocks: an exact match for the bare
# prefix (e.g. GET /api/properties with nothing after it - used by the
# property list/create endpoint) and a prefix match with a trailing slash
# for everything else (/api/properties/<id>, /api/properties/seller/mine,
# ...). A single trailing-slash-only location would silently 404 the bare
# form, since "/api/properties" does not start with "/api/properties/".

limit_req_zone $binary_remote_addr zone=homescape_api:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log;
    limit_req zone=homescape_api burst=40 nodelay;
    client_max_body_size 20M; # image uploads go through here to media-service

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Methods "GET, POST, PATCH, PUT, DELETE, OPTIONS" always;
    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /api/auth       { proxy_pass http://auth-service:4001/;       include /etc/nginx/proxy_params.conf; }
    location /api/auth/        { proxy_pass http://auth-service:4001/;       include /etc/nginx/proxy_params.conf; }

    location = /api/properties { proxy_pass http://property-service:4002/;  include /etc/nginx/proxy_params.conf; }
    location /api/properties/  { proxy_pass http://property-service:4002/;  include /etc/nginx/proxy_params.conf; }

    location = /api/search     { proxy_pass http://search-service:4003/;    include /etc/nginx/proxy_params.conf; }
    location /api/search/      { proxy_pass http://search-service:4003/;    include /etc/nginx/proxy_params.conf; }

    location = /api/inquiries  { proxy_pass http://inquiry-service:4004/;   include /etc/nginx/proxy_params.conf; }
    location /api/inquiries/   { proxy_pass http://inquiry-service:4004/;   include /etc/nginx/proxy_params.conf; }

    location = /api/media      { proxy_pass http://media-service:4005/;    include /etc/nginx/proxy_params.conf; }
    location /api/media/       { proxy_pass http://media-service:4005/;    include /etc/nginx/proxy_params.conf; }

    location /health {
        return 200 '{"service":"gateway","status":"ok"}';
        add_header Content-Type application/json;
    }
}
