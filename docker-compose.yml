version: "3.9"

x-django-env: &django-env
  DJANGO_DEBUG: "true"
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-only-jwt-secret-change-me}
  JWT_ACCESS_TTL_MINUTES: "15"
  JWT_REFRESH_TTL_DAYS: "7"
  REDIS_URL: redis://redis:6379/0

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: homescape
      POSTGRES_PASSWORD: homescape
      POSTGRES_MULTIPLE_DATABASES: auth_db,property_db,search_db,inquiry_db,media_db,notification_db
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres-init:/docker-entrypoint-initdb.d
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homescape"]
      interval: 5s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports: ["9200:9200"]
    volumes: ["es_data:/usr/share/elasticsearch/data"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15

  # ---------- Auth Service ----------
  auth-service:
    build: ./services/auth-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/auth_db
      PORT: "4001"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["4001:4001"]
    command: web

  # ---------- Property Service ----------
  property-service:
    build: ./services/property-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/property_db
      PORT: "4002"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["4002:4002"]
    command: web

  # ---------- Search Service ----------
  search-service:
    build: ./services/search-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/search_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
      PORT: "4003"
    depends_on: { postgres: { condition: service_healthy }, elasticsearch: { condition: service_healthy } }
    ports: ["4003:4003"]
    command: web

  search-service-listener:
    build: ./services/search-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/search_db
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on: { postgres: { condition: service_healthy }, elasticsearch: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Inquiry Service ----------
  inquiry-service:
    build: ./services/inquiry-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/inquiry_db
      PROPERTY_SERVICE_URL: http://property-service:4002
      PORT: "4004"
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    ports: ["4004:4004"]
    command: web

  # ---------- Media Service ----------
  media-service:
    build: ./services/media-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/media_db
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      PORT: "4005"
    volumes: ["media_data:/app/uploads"]
    depends_on: { postgres: { condition: service_healthy } }
    ports: ["4005:4005"]
    command: web

  # ---------- Notification Service ----------
  notification-service:
    build: ./services/notification-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/notification_db
      AUTH_SERVICE_URL: http://auth-service:4001
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFICATIONS_FROM: ${NOTIFICATIONS_FROM:-notifications@homescape.dev}
      PORT: "4006"
    depends_on: { postgres: { condition: service_healthy } }
    ports: ["4006:4006"]
    command: web

  notification-service-listener:
    build: ./services/notification-service
    environment:
      <<: *django-env
      DATABASE_URL: postgres://homescape:homescape@postgres:5432/notification_db
      AUTH_SERVICE_URL: http://auth-service:4001
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      NOTIFICATIONS_FROM: ${NOTIFICATIONS_FROM:-notifications@homescape.dev}
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
    command: listener

  # ---------- Gateway ----------
  gateway:
    build: ./infra/nginx
    depends_on:
      - auth-service
      - property-service
      - search-service
      - inquiry-service
      - media-service
    ports: ["8080:80"]

  # ---------- Frontend ----------
  frontend:
    build: ./frontend
    environment:
      - VITE_API_URL=http://localhost:8080/api
    depends_on: [gateway]
    ports: ["3000:80"]

volumes:
  pg_data:
  es_data:
  media_data:
